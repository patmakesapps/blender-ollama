<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blender Assistant</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2 L2 7 L12 12 L22 7 Z" />
              <path d="M2 17 L12 22 L22 17" />
              <path d="M2 12 L12 17 L22 12" />
            </svg>
          </div>
          <h1>Blender Assistant</h1>
        </div>

        <button id="new-chat" class="new-chat-btn">+ New Chat</button>

        <nav id="chat-list" class="chat-list"></nav>

        <div class="sidebar-footer">
          <button id="open-settings" class="footer-btn">Settings</button>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div class="topbar-title">
            <h2 id="chat-title">New Chat</h2>
          </div>
          <div class="topbar-right">
            <div id="model-pill" class="model-pill">
              <span id="model-pill-text">gpt-5</span>
              <span class="dot online"></span>
            </div>
          </div>
        </header>

        <section id="message-list" class="messages"></section>

        <footer class="composer">
          <div class="composer-inner">
            <textarea
              id="composer-input"
              rows="1"
              placeholder="Ask about modeling, modifiers, materials, animation, scripting, or the current scene…"
            ></textarea>
            <button id="send-button" class="send-btn" aria-label="Send">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 19V5" />
                <path d="M5 12l7-7 7 7" />
              </svg>
            </button>
          </div>
        </footer>
      </main>
    </div>

    <!-- Settings modal -->
    <div id="settings-modal" class="modal hidden">
      <div class="modal-backdrop" data-close></div>
      <div class="modal-panel">
        <div class="modal-head">
          <h2>Settings</h2>
          <button class="icon-btn" data-close aria-label="Close">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="M6 6l12 12"/></svg>
          </button>
        </div>

        <div class="modal-body">
          <div class="provider-switch" id="provider-switch">
            <button class="provider-chip active" data-provider="openai">OpenAI</button>
            <button class="provider-chip" data-provider="anthropic">Anthropic</button>
            <button class="provider-chip" data-provider="ollama">Ollama</button>
          </div>

          <div class="provider-panel" data-panel="openai">
            <label class="field">
              <span>OpenAI model</span>
              <input id="openai-model" type="text" value="gpt-5" />
            </label>
            <label class="field">
              <span>OpenAI API key</span>
              <input id="openai-api-key" type="password" placeholder="Paste an API key to enable OpenAI" />
            </label>
            <p class="helper">Best for the premium copilot path and stronger general quality.</p>
          </div>

          <div class="provider-panel hidden" data-panel="anthropic">
            <label class="field">
              <span>Anthropic model</span>
              <input id="anthropic-model" type="text" value="claude-sonnet-4-20250514" />
            </label>
            <label class="field">
              <span>Anthropic API key</span>
              <input id="anthropic-api-key" type="password" placeholder="Paste an API key to enable Anthropic" />
            </label>
            <p class="helper">Good alternative premium provider if you prefer Claude.</p>
          </div>

          <div class="provider-panel hidden" data-panel="ollama">
            <label class="field">
              <span>Ollama model</span>
              <input id="ollama-model" type="text" value="ministral-3:14b-cloud" />
            </label>
            <p class="helper">Runs against your local Ollama server. No external API key required.</p>
          </div>

          <div id="settings-error" class="settings-error hidden"></div>
        </div>

        <div class="modal-foot">
          <button id="save-settings" class="primary-btn">Save</button>
        </div>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
